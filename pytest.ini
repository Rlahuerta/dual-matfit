# pytest.ini

[pytest]
addopts = --cov=dualmatfit --cov-report=term-missing --cov-report=html
filterwarnings = 
    ignore::DeprecationWarning:scipy.optimize
    ignore:.*multi-threaded.*fork.*deadlock.*:DeprecationWarning
    ignore:.*os.fork.*multithreaded.*:RuntimeWarning

# Custom test markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring full pipeline
    requires_data: marks tests that require external data files
    fast: marks tests as fast unit tests (< 1s each)