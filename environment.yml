name: matfit1d

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────────
  - python>=3.11,<3.14
  - pip>=24.0

  # ── Scientific stack ─────────────────────────────────────────────────────────
  - numpy>=2.2.0
  - scipy>=1.16.1
  - pandas>=2.3.1
  - matplotlib>=3.8.2
  - sympy>=1.14.0
  - seaborn>=0.12.0
  - scikit-learn>=1.1.3
  - numba>=0.61.2
  - numexpr>=2.11.0

  # ── Data I/O ─────────────────────────────────────────────────────────────────
  - pytables>=3.10.2         # import name: tables (HDF5 backend)
  - openpyxl>=3.1.5
  - pyarrow>=21.0.0
  - fastparquet>=2024.2.0
  - markdown>=3.7

  # ── Parallelism / utilities ───────────────────────────────────────────────────
  - joblib>=1.4.2
  - dill>=0.3.8
  - pathos>=0.3.2
  - multiprocess>=0.70.17
  - timeout-decorator>=0.5.0
  - filelock>=3.16.1
  - setuptools>=74.1.2
  - cython>=3.0.0

  # ── JAX CPU ───────────────────────────────────────────────────────────────────
  - jax>=0.7.0
  - jaxlib>=0.7.0            # conda-forge selects the CPU build automatically

  # ── Interactive ───────────────────────────────────────────────────────────────
  - ipython>=9.0.0

  # ── Dev / testing ─────────────────────────────────────────────────────────────
  - pytest>=8.3.3
  - pytest-cov>=5.0.0
  - pytest-xdist>=3.6.1
  - pytest-timeout>=2.4.0
  - coverage>=7.6.3
  - hypothesis>=6.81.1
  - mock>=5.1.0
  - parameterized>=0.9.0

  # ── Lint / type-check ─────────────────────────────────────────────────────────
  - ruff>=0.11.0
  - mypy>=1.8.0
  - isort>=5.13.2

  # ── pip-only packages ─────────────────────────────────────────────────────────
  - pip:
    # IPOPT Python binding: conda-forge build targets py39 only
    - ipyopt>=0.12.10
    # jaxopt: conda-forge has 0.8.4; pyproject requires >=0.8.5
    - jaxopt>=0.8.5
    # LaTeX subprocess utilities
    - latex>=0.7.0
    # Not on conda-forge
    - pipdeptree>=2.23.3
    # Editable install of the package itself
    - -e .